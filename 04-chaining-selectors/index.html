<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaining Selectors</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Images with different styles -->
    <div>
        <img class="diff img1" src="images/pexels-katho-mutodo-8434791.jpg" alt="Woman with Glasses">
        <img class="diff img2" src="images/pexels-andrea-piacquadio-3777931.jpg" alt="Man with surprised expression">
    </div>

    <!-- Images with same styles -->
     <div>
        <img class="same img1" src="images/pexels-andrea-piacquadio-3777931.jpg" alt="Woman wearing eyeglass">
        <img class="same img2" src="images/pexels-katho-mutodo-8434791.jpg" alt="A man showing surprise">
     </div>
</body>
</html>
